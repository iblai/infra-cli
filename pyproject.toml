[project]
name = "iblai-infra"
dynamic = ["version"]
description = "Interactive CLI tool for provisioning ibl.ai infrastructure on AWS"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "rich>=13.7",
    "questionary>=2.0",
    "pydantic>=2.5",
    "boto3>=1.34",
    "typer>=0.12",
]

[project.optional-dependencies]
ansible = ["ansible-core>=2.15"]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.1",
]

[project.scripts]
iblai = "iblai_infra.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/iblai_infra/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/iblai_infra"]

[tool.pytest.ini_options]
addopts = "--strict-markers"
testpaths = ["tests"]
markers = [
    "slow: Run tests that are slow",
]
