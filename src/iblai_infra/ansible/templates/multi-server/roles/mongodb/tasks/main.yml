---
- name: Create MongoDB data directory
  file:
    path: /opt/mongodb/data
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Create MongoDB compose directory
  file:
    path: "/home/{{ ansible_user }}/mongodb"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Template MongoDB docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ ansible_user }}/mongodb/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Start MongoDB container
  become: false
  shell: |
    cd /home/{{ ansible_user }}/mongodb && docker compose up -d
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Wait for MongoDB to be ready
  become: false
  shell: |
    docker exec mongo_sumac mongosh --quiet --eval 'db.runCommand({ping: 1})' -u admin -p '{{ mongo_password }}' --authenticationDatabase admin
  args:
    executable: /bin/bash
  register: mongo_ready
  until: mongo_ready.rc == 0
  retries: 15
  delay: 5
  no_log: true
