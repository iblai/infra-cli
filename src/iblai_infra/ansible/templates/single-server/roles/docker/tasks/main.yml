---
- name: Install prerequisites
  apt:
    name: [ca-certificates, curl, gnupg, lsb-release, unzip, acl, git]
    state: present
    update_cache: true

- name: Ensure keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    mode: "0644"
    content: |
      deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable

- name: Update apt cache after adding Docker repo
  apt:
    update_cache: true

- name: Install Docker engine and plugins
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Ensure Docker is running
  service:
    name: docker
    enabled: true
    state: started

- name: Ensure docker group exists
  group:
    name: docker
    state: present

- name: Add SSH user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- meta: reset_connection

- name: Set docker.sock permissions
  file:
    path: /var/run/docker.sock
    owner: root
    group: docker
    mode: "0660"
  ignore_errors: true
