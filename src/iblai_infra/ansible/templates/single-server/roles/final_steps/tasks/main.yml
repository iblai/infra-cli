# Seeds the Open edX demo course into the LMS/CMS (tutor's bundled course).
# Runs AFTER the DM seeders and BEFORE RBAC, so RBAC's tenant-scoped role
# wiring runs against a fully-populated edX install.
# `ibl tutor local do importdemocourse` is the supported wrapper for
# `tutor local do importdemocourse` — it inherits IBL_ROOT-aware paths.
- name: Seed Open edX demo course
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"
    eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl tutor local do importdemocourse
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

# Skills enrollment + several other edX flows look up the learner's display
# name from `auth_user.first_name` / `last_name` and `student.UserProfile.name`.
# Test users created by `importdemocourse` (`staff`, `honor`, `audit`,
# `verified`, etc.) and any users created by RBAC seeding ship with empty
# name fields. Sweep ALL users and fill the blanks from the username so
# downstream lookups always have a string to render. Idempotent — only
# touches rows where the field is empty.
- name: Backfill empty first_name / last_name / UserProfile.name on LMS users
  become: false
  shell: |
    docker exec ibl_prod_lms ./manage.py lms shell -c "
    from django.contrib.auth.models import User
    from common.djangoapps.student.models import UserProfile

    fixed_user = 0
    fixed_profile = 0
    for u in User.objects.all():
        parts = u.username.replace('_', ' ').replace('-', ' ').replace('.', ' ').title().split()
        first = parts[0] if parts else 'User'
        last = ' '.join(parts[1:]) if len(parts) > 1 else u.username
        changed = False
        if not u.first_name:
            u.first_name = first
            changed = True
        if not u.last_name:
            u.last_name = last
            changed = True
        if changed:
            u.save()
            fixed_user += 1
        profile, was_created = UserProfile.objects.get_or_create(
            user=u,
            defaults={'name': f'{u.first_name} {u.last_name}'.strip() or u.username},
        )
        if not profile.name or not profile.name.strip():
            profile.name = f'{u.first_name} {u.last_name}'.strip() or u.username
            profile.save()
            fixed_profile += 1
        elif was_created:
            fixed_profile += 1
    print(f'Backfilled: {fixed_user} auth_user rows, {fixed_profile} UserProfile rows')
    "
  args:
    executable: /bin/bash

# RBAC must run last — it consumes the resources created by the preceding
# seeders (flows, llm-registry, base-mentors, tools) when wiring up group
# memberships and permissions. Re-ordering will leave the platform without
# the correct role/permission mappings for anything seeded after it.
- name: Seed RBAC data
  become: false
  shell: |
    cd {{ ibl_root }}/app/ibl-dm/ibl-dm-pro/ && docker compose exec -T web ./manage.py seed_rbac_data
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"
