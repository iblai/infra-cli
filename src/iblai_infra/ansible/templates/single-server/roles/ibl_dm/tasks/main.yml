---
- name: Ensure DM postgres data directory has correct ownership
  file:
    path: "{{ ibl_root }}/app/ibl-dm/ibl-dm-pro/data/postgres"
    state: directory
    owner: "999"
    group: "999"
    mode: "0700"
    recurse: true

- name: Pull latest DM postgres image and recreate database container
  become: false
  shell: |
    cd {{ ibl_root }}/app/ibl-dm/ibl-dm-pro/ && docker compose pull dm-data && docker compose up -d --force-recreate dm-data
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Wait for postgres to be ready
  become: false
  shell: |
    docker exec ibl_dm_db pg_isready -U postgres
  args:
    executable: /bin/bash
  register: pg_ready
  until: pg_ready.rc == 0
  retries: 30
  delay: 2

- name: Enable pgvector extension
  become: false
  shell: |
    docker exec ibl_dm_db psql -U postgres -d ibl_dm_db -c "CREATE EXTENSION IF NOT EXISTS vector;"
  args:
    executable: /bin/bash
  register: pgvector_result
  ignore_errors: true

- name: Show pgvector result
  debug:
    var: pgvector_result.stdout_lines
  when: pgvector_result.stdout_lines is defined

- name: Launch IBL Manager (ibl dm launch)
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl dm launch 2>&1
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  timeout: 1800
  register: dm_launch_result
  ignore_errors: true

- name: Show ibl dm launch output
  debug:
    var: dm_launch_result.stdout_lines

- name: Fail if ibl dm launch failed
  fail:
    msg: "ibl dm launch failed with exit code {{ dm_launch_result.rc }}"
  when: dm_launch_result.rc != 0

- name: Verify DM containers are running
  become: false
  shell: docker ps --filter "name=ibl_dm" --format "{{ '{{' }}.Names{{ '}}' }}" 2>&1
  args:
    executable: /bin/bash
  register: dm_containers

- name: Show running DM containers
  debug:
    var: dm_containers.stdout_lines

- name: Fail if no DM containers are running
  fail:
    msg: >-
      No ibl-dm-pro containers found after launch.
      Check 'ibl dm launch' output above for errors
      (common cause: missing ibl_local_default docker network).
  when: dm_containers.stdout | trim | length == 0
