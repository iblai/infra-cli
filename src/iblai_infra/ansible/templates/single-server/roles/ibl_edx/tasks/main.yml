---
- name: Launch Open edX (ibl edx launch)
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl edx launch 2>&1
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  timeout: 3600
  register: edx_launch_result
  ignore_errors: true

- name: Show ibl edx launch output
  debug:
    var: edx_launch_result.stdout_lines

- name: Fail if ibl edx launch failed
  fail:
    msg: "ibl edx launch failed with exit code {{ edx_launch_result.rc }}"
  when: edx_launch_result.rc != 0
