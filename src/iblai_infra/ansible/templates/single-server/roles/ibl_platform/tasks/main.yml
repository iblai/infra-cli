---
- name: Ensure /ibl/ is owned by the SSH user
  file:
    path: "{{ ibl_root }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    recurse: true

- name: Configure edX version
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set IBL_EDX.VERSION='{{ edx_version }}'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Configure base domain
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set BASE_DOMAIN='{{ base_domain }}'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Enable unified API gateway
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set 'IBL_REVERSE_PROXY.ENABLE_UNIFIED_API_GATEWAY=true'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Launch global reverse proxy
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl global-proxy launch-without-security
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Ensure ibl_local_default docker network exists
  become: false
  command: docker network create ibl_local_default
  register: net_create
  failed_when: net_create.rc != 0 and 'already exists' not in (net_create.stderr | default(''))
  changed_when: net_create.rc == 0

- name: Configure environment
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set ENVIRONMENT_CONFIG='{{ env_config }}'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Configure DM image
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set IBL_DM.IBL_DM_IMAGE='765174860755.dkr.ecr.us-east-1.amazonaws.com/ibl-dm-pro:{{ dm_image_tag }}'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Configure edX image
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set IBL_EDX.IBL_EDX_IMAGE='765174860755.dkr.ecr.us-east-1.amazonaws.com/ibl-edx-pro:{{ edx_image_tag }}'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Set edX supporting service image defaults
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set 'IBL_EDX.DOCKER_IMAGE_CADDY=docker.io/caddy:2.11.1'
    ibl config save --set 'IBL_EDX.DOCKER_IMAGE_SMTP=docker.io/devture/exim-relay:4.96-r1-1'
    ibl config save --set 'IBL_EDX.DOCKER_IMAGE_MYSQL=docker.io/mysql:8.0.40'
    ibl config save --set 'IBL_EDX.DOCKER_IMAGE_REDIS=docker.io/redis:7.2.4'
    ibl config save --set 'IBL_EDX.DOCKER_IMAGE_MONGODB=docker.io/mongo:7.0.7'
    ibl config save --set 'IBL_EDX.DOCKER_IMAGE_ELASTICSEARCH=docker.io/elasticsearch:7.17.9'
    ibl config save --set 'IBL_EDX.DOCKER_IMAGE_FORUM=docker.io/overhangio/openedx-forum:19.0.0'
    ibl config save --set 'IBL_EDX.NOTES_DOCKER_IMAGE=docker.io/overhangio/openedx-notes:19.0.0'
    ibl config save --set 'IBL_EDX.MEILISEARCH_DOCKER_IMAGE=docker.io/getmeili/meilisearch:v1.8.4'
    ibl config save --set 'IBL_EDX.PERMISSIONS_DOCKER_IMAGE=docker.io/overhangio/openedx-permissions:18.1.3'
    ibl config save --set 'IBL_EDX.MFE_DOCKER_IMAGE=765174860755.dkr.ecr.us-east-1.amazonaws.com/ibl-edx-mfe-pro:sumac.0.3.2'
    ibl config save --set 'IBL_EDX.IBL_EDX_MAGIC_LINK_LOGIN.ENABLE_JWT_AUTH=True'
    ibl config save --set 'IBL_EDX.IBL_EDX_CORS_HEADER.CORS_ORIGIN_ALLOW_ALL=true'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Set DM postgres image with pgvector support
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set 'IBL_POSTGRES_IMAGE=public.ecr.aws/ibleducation/ibl-postgres-ce:1.1.5'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Enable AI features for DM
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set IBL_DM.ENABLE_IBL_AI={{ enable_ai }} && \
    ibl config save --set IBL_DM.ENABLE_IBL_AI_PLUS={{ enable_ai }} && \
    ibl config save --set IBL_DM.ALLOW_TENANTS_TO_USE_MAIN_LLM_CREDENTIALS=true
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Enable DM RBAC
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set 'IBL_DM.ENABLE_RBAC=true'
    ibl config save --set 'IBL_DM.ENABLE_RBAC_SEEDING=true'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Ensure ibl-edx-uwsgi plugin is enabled
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    python3 -c "
    import yaml
    config_path = '{{ ibl_root }}/config.yml'
    with open(config_path) as f:
        cfg = yaml.safe_load(f) or {}
    edx = cfg.setdefault('IBL_EDX', {})
    plugins = edx.get('PLUGINS', [])
    if isinstance(plugins, str):
        plugins = [p.strip() for p in plugins.split(',') if p.strip()]
    if 'ibl-edx-uwsgi' not in plugins:
        plugins.append('ibl-edx-uwsgi')
        edx['PLUGINS'] = plugins
        with open(config_path, 'w') as f:
            yaml.dump(cfg, f, default_flow_style=False)
        print('Added ibl-edx-uwsgi to plugins')
    else:
        print('ibl-edx-uwsgi already in plugins')
    "
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Generate Langfuse secrets for AI
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    NEXTAUTH_SECRET=$(python3 -c "import secrets, string; print(''.join(secrets.choice(string.ascii_letters + string.digits) for _ in range(32)))")
    SALT=$(python3 -c "import secrets, string; print(''.join(secrets.choice(string.ascii_letters + string.digits) for _ in range(32)))")
    ibl config save --set "IBL_DM.LANGFUSE_NEXTAUTH_SECRET=${NEXTAUTH_SECRET}"
    ibl config save --set "IBL_DM.LANGFUSE_SALT=${SALT}"
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  when: enable_ai | bool

- name: Login to ECR
  become: false
  shell: |
    aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 765174860755.dkr.ecr.us-east-1.amazonaws.com
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ aws_default_region }}"
