---
- name: Ensure /ibl/ is owned by the SSH user
  file:
    path: "{{ ibl_root }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    recurse: true

- name: Restore postgres data directory ownership
  file:
    path: "{{ ibl_root }}/app/ibl-dm/ibl-dm-pro/data/postgres"
    state: directory
    owner: "999"
    group: "999"
    recurse: true
  when: is_resetup | default(false) | bool
  ignore_errors: true

- name: Restart postgres after ownership fix
  become: false
  shell: |
    cd {{ ibl_root }}/app/ibl-dm/ibl-dm-pro/ && docker compose restart dm-data
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"
  when: is_resetup | default(false) | bool
  ignore_errors: true

- name: Wait for postgres to be ready after restart
  become: false
  shell: |
    docker exec ibl_dm_db bash -c 'pg_isready -U "$POSTGRES_USER"'
  args:
    executable: /bin/bash
  register: pg_ready_resetup
  until: pg_ready_resetup.rc == 0
  retries: 30
  delay: 2
  when: is_resetup | default(false) | bool

- name: Capture current MySQL root password before rotation
  become: false
  shell: docker exec ibl_prod_mysql printenv MYSQL_ROOT_PASSWORD
  args:
    executable: /bin/bash
  register: mysql_old_root_pass
  when: is_resetup | default(false) | bool
  ignore_errors: true

- name: Rotate secrets and auth credentials
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config rotate-secrets -f --include-auth
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  when: is_resetup | default(false) | bool

- name: Sync postgres password after secret rotation
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    NEW_PASS=$(python3 -c "
    import yaml
    with open('{{ ibl_root }}/config.yml') as f:
        cfg = yaml.safe_load(f) or {}
    print(cfg.get('IBL_DM', {}).get('DB_PASSWORD', ''))
    ")
    if [ -n "$NEW_PASS" ]; then
      docker exec ibl_dm_db bash -c "psql -U \$POSTGRES_USER -d \$POSTGRES_DB -c \"ALTER USER \$POSTGRES_USER WITH PASSWORD '$NEW_PASS';\""
    fi
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  when: is_resetup | default(false) | bool

- name: Sync MySQL passwords after secret rotation
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    OLD_ROOT_PASS="{{ mysql_old_root_pass.stdout | default('') | trim }}"
    NEW_ROOT_PASS=$(python3 -c "
    import yaml
    with open('{{ ibl_root }}/config.yml') as f:
        cfg = yaml.safe_load(f) or {}
    print(cfg.get('IBL_EDX', {}).get('MYSQL_ROOT_PASSWORD', ''))
    ")
    NEW_OPENEDX_PASS=$(python3 -c "
    import yaml
    with open('{{ ibl_root }}/config.yml') as f:
        cfg = yaml.safe_load(f) or {}
    print(cfg.get('IBL_EDX', {}).get('OPENEDX_MYSQL_PASSWORD', ''))
    ")
    if [ -n "$OLD_ROOT_PASS" ] && [ -n "$NEW_ROOT_PASS" ]; then
      docker exec ibl_prod_mysql mysql -u root -p"$OLD_ROOT_PASS" -e "ALTER USER 'root'@'%' IDENTIFIED BY '$NEW_ROOT_PASS'; ALTER USER 'root'@'localhost' IDENTIFIED BY '$NEW_ROOT_PASS'; FLUSH PRIVILEGES;" 2>/dev/null
      docker exec ibl_prod_mysql mysql -u root -p"$NEW_ROOT_PASS" -e "ALTER USER 'openedx'@'%' IDENTIFIED BY '$NEW_OPENEDX_PASS'; FLUSH PRIVILEGES;" 2>/dev/null
    fi
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  when: is_resetup | default(false) | bool
  ignore_errors: true

# ---------------------------------------------------------------------------
# Fernet key guard
#
# Newer iblai-cli-ops (5.x+) ships an import-time check in
# ibl-edx-sso-backend-app/constants.py (AUTHZ-VULN-06 / issue #1321) that
# rejects a missing or known-bad placeholder IBL_FERNET_KEY. On a fresh
# provision the bootstrap user_data writes a placeholder, so LMS/CMS
# crash-loop with `ImproperlyConfigured` until the key is rotated.
#
# The same guard already lives in ibl_service_update; this block is the
# fresh-provision twin. Only rotates when the key is missing/empty or one
# of the known-bad placeholders — never on a real, unique key.
# ---------------------------------------------------------------------------

- name: Read current IBL_FERNET_KEY from config.yml
  become: false
  shell: |
    python3 -c "
    import yaml
    try:
        with open('{{ ibl_root }}/config.yml') as f:
            cfg = yaml.safe_load(f) or {}
    except FileNotFoundError:
        print('')
    else:
        key = (
            cfg.get('IBL_EDX', {})
               .get('IBL_EDX_SSO_BACKEND_APP', {})
               .get('IBL_FERNET_KEY', '') or ''
        )
        print(key.strip())
    "
  args:
    executable: /bin/bash
  register: current_fernet_key
  changed_when: false
  no_log: true

- name: Set fernet rotation flag
  set_fact:
    fernet_needs_rotation: >-
      {{
        (current_fernet_key.stdout | default('') | trim) in
        ['', 'BAD_FERNET_KEY', '1vCbtt_ffQ2BWc5-msIEeSBXTYNYDErBcSwPqoSjKuI=']
      }}

- name: Ensure backups dir exists (rotate-secrets requires it)
  file:
    path: "{{ ibl_root }}/app/backups"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  when: fernet_needs_rotation | bool

- name: Rotate placeholder IBL_FERNET_KEY
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config rotate-secrets -f --only IBL_EDX.IBL_EDX_SSO_BACKEND_APP.IBL_FERNET_KEY
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  when: fernet_needs_rotation | bool
  register: fernet_rotation
  changed_when: fernet_rotation.rc == 0

- name: Show fernet rotation outcome
  debug:
    msg: >-
      {{
        'IBL_FERNET_KEY was placeholder/empty - rotated to a fresh key.'
        if fernet_needs_rotation
        else 'IBL_FERNET_KEY already set to a non-placeholder value - skipped rotation.'
      }}

- name: Configure edX version
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set IBL_EDX.VERSION='{{ edx_version }}'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Configure base domain
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set BASE_DOMAIN='{{ base_domain }}'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Enable unified API gateway
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set 'IBL_REVERSE_PROXY.ENABLE_UNIFIED_API_GATEWAY=true'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Launch global reverse proxy
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl global-proxy launch-without-security
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Ensure ibl_local_default docker network exists
  become: false
  command: docker network create ibl_local_default
  register: net_create
  failed_when: net_create.rc != 0 and 'already exists' not in (net_create.stderr | default(''))
  changed_when: net_create.rc == 0

- name: Configure environment
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set ENVIRONMENT_CONFIG='{{ env_config }}'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Set edX feature flags
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set 'IBL_EDX.IBL_EDX_MAGIC_LINK_LOGIN.ENABLE_JWT_AUTH=True'
    ibl config save --set 'IBL_EDX.IBL_EDX_CORS_HEADER.CORS_ORIGIN_ALLOW_ALL=true'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

# IBL_EDX.IBL_EDX_SSO_BACKEND_APP needs:
#   - ENABLE_CORS_ORIGIN_WHITELIST: true   (bool — fine with `ibl config save --set`)
#   - IBL_CSRF_EXEMPT_URLS: [/courses, /event, /api/mfe_context]
#     (list — `ibl config save --set` cannot round-trip Python list repr,
#     so we manipulate config.yml directly via PyYAML and let the next
#     `ibl config save` re-render the templates.)
#
# Done in BOTH staging (~/.local/share/ibl/config.yml) and runtime
# (/ibl/config.yml) to dodge the staging-vs-runtime drift class of bug
# (skill iblai-infra-ops §7.5).
- name: Configure SSO backend app — CORS whitelist + CSRF-exempt URLs
  become: false
  shell: |
    python3 -c "
    import yaml
    TARGET_URLS = ['/courses', '/event', '/api/mfe_context']
    files = [
        '/home/{{ ansible_user }}/.local/share/ibl/config.yml',
        '{{ ibl_root }}/config.yml',
    ]
    for path in files:
        try:
            with open(path) as f:
                cfg = yaml.safe_load(f) or {}
        except FileNotFoundError:
            continue
        sso = cfg.setdefault('IBL_EDX', {}).setdefault('IBL_EDX_SSO_BACKEND_APP', {})
        sso['ENABLE_CORS_ORIGIN_WHITELIST'] = True
        existing = sso.get('IBL_CSRF_EXEMPT_URLS') or []
        if not isinstance(existing, list):
            existing = []
        # Preserve existing custom URLs, add the required ones, dedupe.
        sso['IBL_CSRF_EXEMPT_URLS'] = list(dict.fromkeys(existing + TARGET_URLS))
        with open(path, 'w') as f:
            yaml.safe_dump(cfg, f, default_flow_style=False, sort_keys=False)
        print('updated', path)
    "
  args:
    executable: /bin/bash

- name: Enable AI features for DM
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set IBL_DM.ENABLE_IBL_AI={{ enable_ai }} && \
    ibl config save --set IBL_DM.ENABLE_IBL_AI_PLUS={{ enable_ai }} && \
    ibl config save --set IBL_DM.ALLOW_TENANTS_TO_USE_MAIN_LLM_CREDENTIALS=true
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Enable DM RBAC
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set 'IBL_DM.ENABLE_RBAC=true'
    ibl config save --set 'IBL_DM.ENABLE_RBAC_SEEDING=true'
    ibl config save --set 'IBL_DM.ENABLE_TIMESCALEDB=true'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Ensure ibl-edx-uwsgi plugin is enabled
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    python3 -c "
    import yaml
    config_path = '{{ ibl_root }}/config.yml'
    with open(config_path) as f:
        cfg = yaml.safe_load(f) or {}
    edx = cfg.setdefault('IBL_EDX', {})
    plugins = edx.get('PLUGINS', [])
    if isinstance(plugins, str):
        plugins = [p.strip() for p in plugins.split(',') if p.strip()]
    if 'ibl-edx-uwsgi' not in plugins:
        plugins.append('ibl-edx-uwsgi')
        edx['PLUGINS'] = plugins
        with open(config_path, 'w') as f:
            yaml.dump(cfg, f, default_flow_style=False)
        print('Added ibl-edx-uwsgi to plugins')
    else:
        print('ibl-edx-uwsgi already in plugins')
    "
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Generate Langfuse secrets for AI
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    NEXTAUTH_SECRET=$(python3 -c "import secrets, string; print(''.join(secrets.choice(string.ascii_letters + string.digits) for _ in range(32)))")
    SALT=$(python3 -c "import secrets, string; print(''.join(secrets.choice(string.ascii_letters + string.digits) for _ in range(32)))")
    ibl config save --set "IBL_DM.LANGFUSE_NEXTAUTH_SECRET=${NEXTAUTH_SECRET}"
    ibl config save --set "IBL_DM.LANGFUSE_SALT=${SALT}"
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  when: enable_ai | bool

- name: Login to ECR
  become: false
  shell: |
    aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 765174860755.dkr.ecr.us-east-1.amazonaws.com
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ aws_default_region }}"
