---
# ---------------------------------------------------------------------------
# Pre-flight: fix ownership + ECR login
# ---------------------------------------------------------------------------

- name: Restore postgres data directory ownership
  file:
    path: "{{ ibl_root }}/app/ibl-dm/ibl-dm-pro/data/postgres"
    state: directory
    owner: "999"
    group: "999"
    recurse: true
  ignore_errors: true

- name: Login to ECR
  become: false
  shell: |
    aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 765174860755.dkr.ecr.us-east-1.amazonaws.com
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

# ---------------------------------------------------------------------------
# Config save (regenerate all compose files with latest prod-images)
# ---------------------------------------------------------------------------

- name: Save platform config
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Save edX tutor config
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl tutor config save
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

# ---------------------------------------------------------------------------
# edX: ensure running + health check
# ---------------------------------------------------------------------------

- name: Ensure edX services are running
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl edx start -d
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  timeout: 600

- name: Wait for LMS to be ready
  become: false
  shell: |
    curl -s -o /dev/null -w '%{http_code}' http://localhost:8600/heartbeat 2>/dev/null | grep -qE '^(200|301|302|404)$'
  args:
    executable: /bin/bash
  register: lms_health
  until: lms_health.rc == 0
  retries: 40
  delay: 15

# ---------------------------------------------------------------------------
# DM: ensure running + wait for collectstatic + health check
# ---------------------------------------------------------------------------

- name: Ensure DM containers are running
  become: false
  shell: |
    cd {{ ibl_root }}/app/ibl-dm/ibl-dm-pro/ && nohup docker compose up -d > /tmp/dm-compose.log 2>&1 &
    sleep 5
    echo "DM compose started in background"
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Wait for DM web to be ready
  become: false
  shell: |
    curl -s -o /dev/null -w '%{http_code}' http://localhost:8400/ 2>/dev/null | grep -qE '^(200|301|302|404)$'
  args:
    executable: /bin/bash
  register: dm_health
  until: dm_health.rc == 0
  retries: 60
  delay: 15

- name: Run DM migrations
  become: false
  shell: |
    cd {{ ibl_root }}/app/ibl-dm/ibl-dm-pro/ && docker compose exec -T web ./manage.py migrate --noinput
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"
  timeout: 600

# ---------------------------------------------------------------------------
# SPAs: force restart (containers may have exited from AMI shutdown)
# ---------------------------------------------------------------------------

- name: Restart Auth SPA
  become: false
  shell: |
    cd {{ ibl_root }}/app/ibl-spa/auth/ && docker compose down 2>/dev/null; docker compose up -d
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Wait for Auth SPA to be ready
  become: false
  shell: |
    curl -s -o /dev/null -w '%{http_code}' http://localhost:5000/ 2>/dev/null | grep -qE '^(200|301|302)$'
  args:
    executable: /bin/bash
  register: auth_health
  until: auth_health.rc == 0
  retries: 10
  delay: 15

- name: Restart Mentor SPA
  become: false
  shell: |
    cd {{ ibl_root }}/app/ibl-spa/mentor/ && docker compose down 2>/dev/null; docker compose up -d
    echo "Mentor container started, waiting 30s for initial boot..."
    sleep 30
    STATUS=$(docker ps --filter "name=mentor" --format "{{ '{{' }}.Status{{ '}}' }}")
    HTTP=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5001/ 2>/dev/null || echo "000")
    echo "Container status: $STATUS | HTTP: $HTTP"
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Wait for Mentor SPA to be ready (with debug)
  become: false
  shell: |
    HTTP=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5001/ 2>/dev/null)
    echo "Mentor HTTP: $HTTP"
    if echo "$HTTP" | grep -qE '^(200|301|302)$'; then
      exit 0
    fi
    # If empty reply, try a restart
    if [ "$HTTP" = "000" ]; then
      echo "Empty reply detected, restarting mentor..."
      cd {{ ibl_root }}/app/ibl-spa/mentor/ && docker compose restart 2>/dev/null
      sleep 15
      HTTP=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5001/ 2>/dev/null)
      echo "After restart: HTTP $HTTP"
      echo "$HTTP" | grep -qE '^(200|301|302)$'
    else
      exit 1
    fi
  args:
    executable: /bin/bash
  register: mentor_health
  until: mentor_health.rc == 0
  retries: 10
  delay: 20
  ignore_errors: true

- name: Show Mentor SPA final status
  become: false
  shell: |
    HTTP=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5001/ 2>/dev/null)
    STATUS=$(docker ps --filter "name=mentor" --format "{{ '{{' }}.Names{{ '}}' }}: {{ '{{' }}.Status{{ '}}' }}")
    echo "Final - HTTP: $HTTP | Container: $STATUS"
    docker logs mentor-mentor_spa-1 --tail 5 2>&1
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Restart Skills SPA
  become: false
  shell: |
    cd {{ ibl_root }}/app/ibl-spa/skills/ && docker compose down 2>/dev/null; docker compose up -d
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Wait for Skills SPA to be ready
  become: false
  shell: |
    curl -s -o /dev/null -w '%{http_code}' http://localhost:5002/ 2>/dev/null | grep -qE '^(200|301|302)$'
  args:
    executable: /bin/bash
  register: skills_health
  until: skills_health.rc == 0
  retries: 10
  delay: 15

# ---------------------------------------------------------------------------
# Integrations (OAuth/OIDC — prevents 409 auth errors)
# ---------------------------------------------------------------------------

- name: Run OAuth and OIDC integrations
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl launch --ibl-oauth --ibl-oidc --ibl-edx-manager
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  timeout: 600

- name: Run DM auth setup
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl dm auth-setup
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  timeout: 600

- name: Sync edX with DM
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl edx sync-with-manager --users
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  timeout: 600
  ignore_errors: true

- name: Sync SPA SSO credentials from LMS to Auth SPA config
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"

    # Read SSO client credentials from LMS database (source of truth)
    # Use grep with a unique marker to avoid Django startup noise
    SSO_CREDS=$(docker exec ibl_prod_lms ./manage.py lms shell -c "
    from oauth2_provider.models import Application
    try:
        app = Application.objects.get(name='spa-sso')
        print('SSO_RESULT:' + app.client_id + '|' + app.client_secret)
    except Application.DoesNotExist:
        print('SSO_RESULT:MISSING')
    " 2>/dev/null | grep '^SSO_RESULT:' | sed 's/^SSO_RESULT://')

    if [ -z "$SSO_CREDS" ] || [ "$SSO_CREDS" = "MISSING" ]; then
      echo "No spa-sso app in LMS, skipping"
    else
      IFS='|' read SSO_CLIENT_ID SSO_CLIENT_SECRET <<< "$SSO_CREDS"
      echo "SSO client_id: ${SSO_CLIENT_ID:0:15}..."
      echo "SSO secret: ${SSO_CLIENT_SECRET:0:10}..."

      # Write back to config so Auth SPA env.js picks it up
      ibl config save --set "IBL_SPA.EDX_SSO_CLIENT_ID=$SSO_CLIENT_ID" 2>/dev/null
      ibl config save --set "IBL_SPA.EDX_SSO_CLIENT_SECRET=$SSO_CLIENT_SECRET" 2>/dev/null

      # Also read ibl_web client ID
      IBL_WEB_ID=$(docker exec ibl_prod_lms ./manage.py lms shell -c "
      from oauth2_provider.models import Application
      try:
          app = Application.objects.get(name='ibl_web')
          print('WEB_RESULT:' + app.client_id)
      except Application.DoesNotExist:
          print('WEB_RESULT:')
      " 2>/dev/null | grep '^WEB_RESULT:' | sed 's/^WEB_RESULT://')

      if [ -n "$IBL_WEB_ID" ]; then
        ibl config save --set "IBL_SPA.AUTH.IBL_OAUTH2_CLIENT_ID=$IBL_WEB_ID" 2>/dev/null
        echo "ibl_web client_id: ${IBL_WEB_ID:0:15}..."
      fi

      # Regenerate config with SSO creds and restart Auth SPA
      ibl config save 2>/dev/null
      cd {{ ibl_root }}/app/ibl-spa/auth/ && docker compose down 2>/dev/null; docker compose up -d
      echo "Auth SPA restarted with synced SSO credentials"
    fi
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  ignore_errors: true

# ---------------------------------------------------------------------------
# Ensure Playwright test users exist in LMS with correct password
# ---------------------------------------------------------------------------

- name: Ensure all browser test users exist in LMS
  become: false
  shell: |
    PASSWORD="ibledu_2024"
    FAILED=0
    for EMAIL in iblaiuserchromenew@ibleducation.com iblaiuserfirefoxnew@ibleducation.com iblaiusersafarinew@ibleducation.com iblaiuseredgenew@ibleducation.com; do
      USERNAME=$(echo "$EMAIL" | cut -d@ -f1)
      MARKER=$(docker exec ibl_prod_lms ./manage.py lms shell -c "from django.contrib.auth import get_user_model; User = get_user_model(); u, c = User.objects.update_or_create(username='$USERNAME', defaults={'email': '$EMAIL', 'is_active': True}); u.set_password('$PASSWORD'); u.save(); print('USER_OK=CREATED' if c else 'USER_OK=UPDATED')" 2>/dev/null | grep '^USER_OK=' | tail -1)
      if [ -n "$MARKER" ]; then
        echo "$MARKER - $EMAIL"
      else
        echo "FAILED - $EMAIL"
        docker exec ibl_prod_lms ./manage.py lms shell -c "from django.contrib.auth import get_user_model; print('MODEL=' + str(get_user_model().objects.filter(email='$EMAIL').count()))" 2>/dev/null | grep '^MODEL=' || true
        FAILED=$((FAILED + 1))
      fi
    done
    if [ $FAILED -gt 0 ]; then
      echo "WARNING - $FAILED users failed"
    fi
    echo "Test user provisioning complete"
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"
  ignore_errors: true

# ---------------------------------------------------------------------------
# Nginx + proxy reload
# ---------------------------------------------------------------------------

- name: Reload proxy and restart nginx
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl global-proxy reload 2>/dev/null || true
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Restart nginx
  shell: systemctl restart nginx

# ---------------------------------------------------------------------------
# Smoke test: verify SSO login + DM API + Mentor chat before handing off
# ---------------------------------------------------------------------------

- name: "Smoke test - get base domain from config"
  become: false
  shell: |
    grep -E '^BASE_DOMAIN' {{ ibl_root }}/app/ibl-dm/ibl-dm-pro/config.yml | head -1 | awk '{print $2}' | tr -d "\"'"
  args:
    executable: /bin/bash
  register: base_domain_result

- name: "Smoke test - set domain fact"
  set_fact:
    smoke_base_domain: "{{ base_domain_result.stdout | trim }}"

- name: "Smoke test - get SSO credentials from LMS"
  become: false
  shell: >-
    docker exec ibl_prod_lms ./manage.py lms shell -c
    "from oauth2_provider.models import Application;
    app = Application.objects.get(name='spa-sso');
    print('SSO_RESULT=' + app.client_id + '|' + app.client_secret)"
    2>/dev/null | grep '^SSO_RESULT=' | sed 's/^SSO_RESULT=//'
  args:
    executable: /bin/bash
  register: sso_creds_result
  ignore_errors: true

- name: "Smoke test - set SSO credential facts"
  set_fact:
    smoke_sso_client_id: "{{ sso_creds_result.stdout.split('|')[0] | default('') }}"
    smoke_sso_client_secret: "{{ sso_creds_result.stdout.split('|')[1] | default('') }}"
  when: sso_creds_result.rc == 0 and '|' in sso_creds_result.stdout

- name: "Smoke test - verify SSO token for browser test users"
  become: false
  shell: |
    FAILED=0
    CLIENT_ID="{{ smoke_sso_client_id | default('') }}"
    CLIENT_SECRET="{{ smoke_sso_client_secret | default('') }}"
    if [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ]; then
      echo "SKIP - SSO credentials not available"
      exit 0
    fi
    echo "=== SSO Login Smoke Test ==="
    for USER in iblaiuserchromenew@ibleducation.com iblaiuserfirefoxnew@ibleducation.com iblaiusersafarinew@ibleducation.com iblaiuseredgenew@ibleducation.com; do
      BODY=$(curl -sk -X POST "http://localhost:8600/oauth2/access_token/" \
        -d "grant_type=password" \
        -d "client_id=$CLIENT_ID" \
        -d "client_secret=$CLIENT_SECRET" \
        -d "username=$USER" \
        -d "password=ibledu_2024" 2>/dev/null)
      if echo "$BODY" | grep -q '"access_token"'; then
        echo "PASS - $USER"
      else
        echo "FAIL - $USER"
        echo "  $(echo "$BODY" | head -c 200)"
        FAILED=$((FAILED + 1))
      fi
    done
    echo ""
    if [ $FAILED -gt 0 ]; then
      echo "SMOKE_LOGIN - $FAILED/4 users FAILED"
      exit 1
    else
      echo "SMOKE_LOGIN - All 4 users authenticated successfully"
    fi
  args:
    executable: /bin/bash
  register: smoke_login

- name: "Smoke test - SSO login warning"
  ansible.builtin.debug:
    msg: "WARNING - SSO login failed for some users. Check test user setup in LMS."
  when: smoke_login.rc != 0 and (smoke_login.stdout | default('')) is not search('SKIP')

- name: "Smoke test - verify DM API responds"
  become: false
  shell: |
    echo "=== DM API Smoke Test ==="
    HTTP=$(curl -sk -o /dev/null -w '%{http_code}' http://localhost:8400/ 2>/dev/null)
    if echo "$HTTP" | grep -qE '^(200|301|302|404)$'; then
      echo "PASS - DM API responded (HTTP $HTTP)"
    else
      echo "FAIL - DM not reachable (HTTP $HTTP)"
      exit 1
    fi
  args:
    executable: /bin/bash
  register: smoke_dm
  ignore_errors: true

- name: "Smoke test - verify Mentor SPA and API"
  become: false
  shell: |
    echo "=== Mentor Smoke Test ==="
    HTTP=$(curl -sk -o /dev/null -w '%{http_code}' http://localhost:5001/ 2>/dev/null)
    echo "Mentor SPA HTTP - $HTTP"
    if ! echo "$HTTP" | grep -qE '^(200|301|302)$'; then
      echo "FAIL - Mentor SPA not responding (HTTP $HTTP)"
      exit 1
    fi
    CHAT_HTTP=$(curl -sk -o /dev/null -w '%{http_code}' http://localhost:8400/api/ibl/manage/v1/mentor/ 2>/dev/null)
    echo "DM Mentor API HTTP - $CHAT_HTTP"
    if echo "$CHAT_HTTP" | grep -qE '^(200|301|302|401|403|404)$'; then
      echo "PASS - Mentor API reachable (HTTP $CHAT_HTTP)"
    else
      echo "FAIL - Mentor API unreachable (HTTP $CHAT_HTTP)"
      exit 1
    fi
  args:
    executable: /bin/bash
  register: smoke_mentor
  ignore_errors: true

- name: "Smoke test - results summary"
  ansible.builtin.debug:
    msg: |
      === SMOKE TEST RESULTS ===
      SSO Login:   {{ 'PASS' if (smoke_login.rc | default(1)) == 0 else 'FAIL' }}
      DM API:      {{ 'PASS' if (smoke_dm.rc | default(1)) == 0 else 'FAIL' }}
      Mentor:      {{ 'PASS' if (smoke_mentor.rc | default(1)) == 0 else 'FAIL' }}
      {{ 'All smoke tests passed. Environment is ready for Playwright tests.' if ((smoke_login.rc | default(1)) == 0 and (smoke_dm.rc | default(1)) == 0 and (smoke_mentor.rc | default(1)) == 0) else 'WARNING - Some smoke tests failed. Check logs above.' }}
