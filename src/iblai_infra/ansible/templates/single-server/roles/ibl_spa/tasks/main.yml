---
- name: Generate SPA SSO client credentials
  shell: |
    python3 -c "
    import string, random, base64
    chars = string.ascii_letters + string.digits
    cid = base64.b64encode(''.join(random.choice(chars) for _ in range(30)).encode()).decode()
    sec = base64.b64encode(''.join(random.choice(chars) for _ in range(60)).encode()).decode()
    print(cid)
    print(sec)
    "
  register: spa_credentials
  changed_when: false

- name: Set SPA credential facts
  set_fact:
    spa_sso_client_id: "{{ spa_credentials.stdout_lines[0] | trim }}"
    spa_sso_client_secret: "{{ spa_credentials.stdout_lines[1] | trim }}"

- name: Wait for LMS to be ready and stable
  become: false
  shell: |
    docker inspect --format='{{ '{{' }}.State.Running{{ '}}' }}' ibl_prod_lms 2>/dev/null | grep -q true && \
    docker inspect --format='{{ '{{' }}.State.Restarting{{ '}}' }}' ibl_prod_lms 2>/dev/null | grep -q false && \
    docker exec ibl_prod_lms echo "LMS ready"
  args:
    executable: /bin/bash
  register: lms_ready
  until: lms_ready.rc == 0
  retries: 60
  delay: 15

# spa-sso must be `client_type=public` + `authorization_grant_type=authorization-code`
# to match the Auth SPA's actual login flow (browser-driven authorization-code
# redirect against learn.<domain>/oauth2/authorize). The earlier `confidential` +
# `password` defaults predate the SPA's real auth flow and would only authenticate
# via curl-style password grants — never through the SPA itself. `get_or_create`
# defaults are NOT applied to existing rows, so we explicitly enforce the
# desired client_type / grant_type / redirect_uris on every run (idempotent).
#
# redirect_uris must include the env's own auth SPA AND auth.ibl.ai so the
# canonical production Auth SPA can also redirect back into this env. Each
# host gets both /login/complete (web) and /login/mobile/complete (mobile)
# callbacks. oauth2_provider stores this as a space-separated string.
- name: Create OAuth2 Application in edX for SPA SSO
  become: false
  shell: |
    docker exec ibl_prod_lms ./manage.py lms shell -c "
    from oauth2_provider.models import Application
    from django.contrib.auth.models import User
    REDIRECT_URIS = ' '.join([
        'https://auth.{{ base_domain }}/login/complete',
        'https://auth.ibl.ai/login/complete',
        'https://auth.{{ base_domain }}/login/mobile/complete',
        'https://auth.ibl.ai/login/mobile/complete',
    ])
    usr = User.objects.get(username='ibl_admin')
    app, created = Application.objects.get_or_create(
        name='spa-sso',
        user=usr,
        defaults={
            'client_id': '{{ spa_sso_client_id }}',
            'client_secret': '{{ spa_sso_client_secret }}',
            'client_type': 'public',
            'authorization_grant_type': 'authorization-code',
            'redirect_uris': REDIRECT_URIS,
            'skip_authorization': True,
        },
    )
    changed = False
    if app.client_type != 'public':
        app.client_type = 'public'; changed = True
    if app.authorization_grant_type != 'authorization-code':
        app.authorization_grant_type = 'authorization-code'; changed = True
    existing_uris = set((app.redirect_uris or '').split())
    expected_uris = set(REDIRECT_URIS.split())
    if existing_uris != expected_uris:
        app.redirect_uris = REDIRECT_URIS; changed = True
    if changed:
        app.save()
    print(app.client_id)
    "
  args:
    executable: /bin/bash
  register: oauth_app_result
  until: oauth_app_result.rc == 0
  retries: 10
  delay: 30

- name: Capture actual SPA SSO client ID from edX
  set_fact:
    spa_sso_client_id: "{{ oauth_app_result.stdout_lines | last | trim }}"
  when:
    - oauth_app_result.stdout_lines is defined
    - oauth_app_result.stdout_lines | length > 0

- name: Create ibl_web OAuth2 Application for Auth SPA
  become: false
  shell: |
    docker exec ibl_prod_lms ./manage.py lms shell -c \
      'from oauth2_provider.models import Application; from django.contrib.auth.models import User; usr=User.objects.get(username="ibl_admin"); app, created = Application.objects.get_or_create(name="ibl_web", user=usr, defaults={"client_type": "public", "authorization_grant_type": "password", "redirect_uris": "", "skip_authorization": True}); print(app.client_id)'
  args:
    executable: /bin/bash
  register: ibl_web_app_result
  until: ibl_web_app_result.rc == 0
  retries: 10
  delay: 15

- name: Capture ibl_web client ID
  set_fact:
    ibl_web_client_id: "{{ ibl_web_app_result.stdout_lines | last | trim }}"
  when:
    - ibl_web_app_result.stdout_lines is defined
    - ibl_web_app_result.stdout_lines | length > 0

- name: Set SPA configuration defaults
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set 'IBL_SPA.EDX_SSO_CLIENT_ID={{ spa_sso_client_id }}'
    ibl config save --set 'IBL_SPA.AUTH.IBL_OAUTH2_CLIENT_ID={{ ibl_web_client_id }}'
    ibl config save --set 'IBL_SPA.AUTH.DOMAIN=https://auth.{{ base_domain }}'
    ibl config save --set 'IBL_SPA.AUTH.DEFAULT_APP_URL=mentorai.{{ base_domain }}'
    ibl config save --set 'IBL_SPA.ENVIRONMENT={{ base_domain }}'
    ibl config save --set 'IBL_SPA.MENTOR.IFRAME_MENTOR_DOMAIN=https://mentorai.{{ base_domain }}'
    ibl config save --set 'IBL_SPA.MENTOR.DOMAIN=https://mentorai.{{ base_domain }}'
    ibl config save --set 'IBL_SPA.SKILLS.DOMAIN=skillsai.{{ base_domain }}'
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Set SPA quoted boolean values in config.yml
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    python3 -c "
    import yaml
    config_path = '{{ ibl_root }}/config.yml'
    with open(config_path) as f:
        cfg = yaml.safe_load(f) or {}
    spa = cfg.setdefault('IBL_SPA', {})
    mentor = spa.setdefault('MENTOR', {})
    mentor['ENABLE_RBAC'] = 'true'
    mentor['STRIPE_ENABLED'] = 'false'
    mentor['ENABLE_ADVERTISING'] = 'false'
    mentor['SKIP_TEST'] = 'true'
    mentor['ENABLE_APP_SITE_ASSOCIATION'] = 'true'
    mentor['CANVAS_ADMIN_ONLY'] = 'false'
    mentor['HIDE_ANALYTICS'] = 'false'
    skills = spa.setdefault('SKILLS', {})
    skills['ENABLE_RBAC'] = 'true'
    with open(config_path, 'w') as f:
        yaml.dump(cfg, f, default_flow_style=False)
    print('SPA boolean config values set')
    "
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Re-render templates with SPA configuration
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Login to ECR for SPA images
  become: false
  shell: |
    aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 765174860755.dkr.ecr.us-east-1.amazonaws.com
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ aws_default_region }}"

- name: Launch Auth SPA
  become: false
  shell: |
    cd {{ ibl_root }}/app/ibl-spa/auth/ && docker compose pull && docker compose down && docker compose up -d
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"
  register: auth_spa_result
  retries: 2
  delay: 5

# Budget: 30 × 15s = 450s (7.5 min). SPA images don't ship with
# node_modules baked in — the container runs `pnpm install` on first
# boot (~80–120s observed) before Next.js can start. Combined with
# `docker compose pull` and image-extraction overhead, cold start can
# easily exceed the older 10-retry / 150s budget on a slower instance
# or marginal network. 450s comfortably covers that without making
# real failures take an unreasonable amount of time to surface.
- name: Wait for Auth SPA to be ready
  become: false
  shell: |
    curl -s -o /dev/null -w '%{http_code}' http://localhost:5000/ 2>/dev/null | grep -qE '^(200|301|302)$'
  args:
    executable: /bin/bash
  register: auth_health
  until: auth_health.rc == 0
  retries: 30
  delay: 15

- name: Launch Mentor SPA
  become: false
  shell: |
    cd {{ ibl_root }}/app/ibl-spa/mentor/ && docker compose pull && docker compose down && docker compose up -d
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"
  register: mentor_spa_result
  retries: 2
  delay: 5

- name: Wait for Mentor SPA to be ready
  # Same 450s cold-start budget rationale as the Auth SPA wait above —
  # node_modules install on first boot pushes ready-time past the older
  # 150s budget on slower hosts.
  become: false
  shell: |
    curl -s -o /dev/null -w '%{http_code}' http://localhost:5001/ 2>/dev/null | grep -qE '^(200|301|302)$'
  args:
    executable: /bin/bash
  register: mentor_health
  until: mentor_health.rc == 0
  retries: 30
  delay: 15

- name: Launch Skills SPA
  become: false
  shell: |
    cd {{ ibl_root }}/app/ibl-spa/skills/ && docker compose pull && docker compose down && docker compose up -d
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"
  register: skills_spa_result
  retries: 2
  delay: 5

- name: Wait for Skills SPA to be ready
  # Same 450s cold-start budget rationale as the Auth SPA wait above —
  # node_modules install on first boot pushes ready-time past the older
  # 150s budget on slower hosts.
  become: false
  shell: |
    curl -s -o /dev/null -w '%{http_code}' http://localhost:5002/ 2>/dev/null | grep -qE '^(200|301|302)$'
  args:
    executable: /bin/bash
  register: skills_health
  until: skills_health.rc == 0
  retries: 30
  delay: 15

- name: Save config and reload proxy after SPA launch
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save && ibl global-proxy reload
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"

- name: Verify SPA containers are running
  command: docker ps --format "table {% raw %}{{.Names}}\t{{.Status}}{% endraw %}" --filter "name=spa"
  register: spa_containers
  changed_when: false

- name: Display SPA status
  debug:
    msg: "{{ spa_containers.stdout_lines }}"
