---
# Optional Microsoft (Azure AD) SSO configuration. Runs only when
# `microsoft_sso_enabled` is true (CLI prompt during setup, or
# `--microsoft-sso-client-id` for launch).
#
# Two things get configured:
#   1. `IBL_EDX.IBL_EDX_BASE_OAUTH_SSO_BACKEND` block in `/ibl/config.yml`
#      — populated via direct Python yaml manipulation (the block has
#      nested dicts + a list, which `ibl config save --set` cannot
#      round-trip). After patching we run `ibl config save` to regenerate
#      the LMS settings + compose files, then restart edX so the new
#      Django settings actually take effect.
#   2. An `OAuth2ProviderConfig` row on the LMS for the `azuread-oauth2`
#      slug, with `backend_name` = `azuread-oauth2` (the standard Azure AD
#      social-auth backend — must match the slug and the Azure-registered
#      redirect URI). Defaults set `sync_learner_profile_data=True`
#      because Microsoft id tokens carry profile fields we want to sync
#      on every login.
#      `other_settings` carries the Microsoft-specific
#      platform_key/backend_uri/logout_url JSON blob.
#
# Idempotency:
#   - The config patch task only runs `ibl config save` + edX restart
#     when the existing `IBL_EDX_BASE_OAUTH_SSO_BACKEND` block already
#     differs from the desired values. Re-runs against an
#     already-configured environment skip the heavy restart.
#   - The `OAuth2ProviderConfig` task uses `current(slug)` to check
#     whether the latest revision already matches; only saves a new
#     revision when something changed.
#
# `no_log: true` guards the tasks that render the Client Secret AND the
# Tenant ID via Jinja substitution. The whole role is gated by
# `when: microsoft_sso_enabled | default(false) | bool` so it stays a
# no-op when the operator hasn't opted in.

- name: Wait for LMS container to be ready
  become: false
  ansible.builtin.shell:
    cmd: |
      docker inspect --format='{{ '{{' }}.State.Running{{ '}}' }}' ibl_prod_lms 2>/dev/null | grep -q true && \
      docker exec ibl_prod_lms echo "LMS ready"
    executable: /bin/bash
  register: lms_ready
  until: lms_ready.rc == 0
  retries: 30
  delay: 10
  when: microsoft_sso_enabled | default(false) | bool

- name: Patch /ibl/config.yml with IBL_EDX_BASE_OAUTH_SSO_BACKEND block
  become: false
  ansible.builtin.shell:
    cmd: |
      python3 <<'PY'
      import yaml

      PATH = "{{ ibl_root }}/config.yml"
      PLATFORM_NAME = "{{ platform_name | default('main') }}"
      TENANT_ID = "{{ microsoft_sso_tenant_id }}"
      BASE_DOMAIN = "{{ base_domain }}"
      # Azure AD requires the standard `azuread-oauth2` social-auth backend.
      # It must equal the OAuth2ProviderConfig slug AND the registered redirect
      # URI (/auth/complete/azuread-oauth2/). The old `<platform>-oauth2` value
      # was not a real Azure backend, so SSO never completed.
      BACKEND_NAME = "azuread-oauth2"

      desired = {
          "ENABLE_EDX_BASE_OAUTH_SSO_BACKEND": True,
          "IBL_OAUTH_SSO_NAME": BACKEND_NAME,
          "TRACKED_PROVIDERS": [BACKEND_NAME],
          "IBL_OAUTH_SSO_OIDC_ENDPOINT": "https://login.microsoftonline.com/" + TENANT_ID + "/v2.0",
          "IBL_OAUTH_SSO_JWKS_URI": "https://login.microsoftonline.com/" + TENANT_ID + "/v2.0/.well-known",
          "IBL_OAUTH_USE_IDP_USERNAME": False,
          "IBL_OAUTH_SSO_JWT_DECODE_OPTIONS": {"verify_nbf": False},
          "SOCIAL_AUTH_REDIRECT_IS_HTTPS": True,
          "IBL_OAUTH_SSO_USE_IDTOKEN_FIELDS": True,
          "LEARNER_PORTAL_URL_ROOT": "https://mentor." + BASE_DOMAIN,
      }

      try:
          with open(PATH) as f:
              cfg = yaml.safe_load(f) or {}
      except FileNotFoundError:
          cfg = {}

      current = cfg.get("IBL_EDX", {}).get("IBL_EDX_BASE_OAUTH_SSO_BACKEND")
      if current == desired:
          print("CONFIG_UNCHANGED")
      else:
          cfg.setdefault("IBL_EDX", {})["IBL_EDX_BASE_OAUTH_SSO_BACKEND"] = desired
          with open(PATH, "w") as f:
              yaml.safe_dump(cfg, f, default_flow_style=False, sort_keys=False)
          print("CONFIG_PATCHED")
      PY
    executable: /bin/bash
  register: config_patch
  changed_when: "'CONFIG_PATCHED' in (config_patch.stdout | default(''))"
  no_log: true
  when: microsoft_sso_enabled | default(false) | bool

- name: Save platform config (regenerate LMS settings + compose files)
  become: false
  ansible.builtin.shell:
    cmd: |
      export PYENV_ROOT="{{ pyenv_root }}"
      export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
      pyenv activate "{{ venv_name }}"
      ibl config save
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  when:
    - microsoft_sso_enabled | default(false) | bool
    - config_patch.changed | default(false)

- name: Stop edX (so settings reload picks up new IBL_EDX_BASE_OAUTH_SSO_BACKEND)
  become: false
  ansible.builtin.shell:
    cmd: |
      export PYENV_ROOT="{{ pyenv_root }}"
      export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
      pyenv activate "{{ venv_name }}"
      ibl edx stop
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  when:
    - microsoft_sso_enabled | default(false) | bool
    - config_patch.changed | default(false)

- name: Start edX
  become: false
  ansible.builtin.shell:
    cmd: |
      export PYENV_ROOT="{{ pyenv_root }}"
      export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
      pyenv activate "{{ venv_name }}"
      ibl edx start -d
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  when:
    - microsoft_sso_enabled | default(false) | bool
    - config_patch.changed | default(false)

- name: Wait for LMS container ready after edX restart
  become: false
  ansible.builtin.shell:
    cmd: |
      docker inspect --format='{{ '{{' }}.State.Running{{ '}}' }}' ibl_prod_lms 2>/dev/null | grep -q true && \
      docker exec ibl_prod_lms echo "LMS ready"
    executable: /bin/bash
  register: lms_ready_post_restart
  until: lms_ready_post_restart.rc == 0
  retries: 30
  delay: 10
  when:
    - microsoft_sso_enabled | default(false) | bool
    - config_patch.changed | default(false)

- name: Configure Microsoft SSO in LMS (OAuth2ProviderConfig)
  become: false
  ansible.builtin.shell:
    cmd: |
      docker exec -i ibl_prod_lms python manage.py lms shell <<'PY'
      import json
      from django.contrib.sites.models import Site
      from common.djangoapps.third_party_auth.models import OAuth2ProviderConfig

      BASE_DOMAIN = "{{ base_domain }}"
      LMS_HOST = "learn." + BASE_DOMAIN
      PLATFORM_NAME = "{{ platform_name | default('main') }}"
      # Azure AD requires the standard `azuread-oauth2` social-auth backend.
      # It must equal the OAuth2ProviderConfig slug AND the registered redirect
      # URI (/auth/complete/azuread-oauth2/). The old `<platform>-oauth2` value
      # was not a real Azure backend, so SSO never completed.
      BACKEND_NAME = "azuread-oauth2"
      SLUG = "azuread-oauth2"
      TENANT_ID = "{{ microsoft_sso_tenant_id }}"
      CLIENT_ID = "{{ microsoft_sso_client_id }}"
      CLIENT_SECRET = "{{ microsoft_sso_client_secret }}"
      ORG_SHORT_NAME = "{{ microsoft_sso_organization }}"

      # 1. Resolve the Site this provider config attaches to.
      site, _ = Site.objects.get_or_create(
          domain=LMS_HOST,
          defaults={"name": LMS_HOST},
      )

      # 2. Optional Organization — only attach when supplied AND it exists.
      #    Don't auto-create organizations from this role.
      org = None
      if ORG_SHORT_NAME:
          try:
              from organizations.models import Organization
              org = Organization.objects.filter(short_name=ORG_SHORT_NAME).first()
          except Exception:
              org = None

      # 3. Build the Microsoft-specific other_settings JSON. The shape mirrors
      #    what the IBL plugin's AzureADOAuth2 patch reads at login time.
      other_settings = json.dumps({
          "platform_key": PLATFORM_NAME,
          "backend_uri": "/auth/login/" + BACKEND_NAME,
          "logout_url": "https://login.microsoftonline.com/" + TENANT_ID + "/oauth2/v2.0/logout",
      }, indent=4)

      # 4. Idempotency check — same pattern as google_sso_config. ConfigurationModel
      #    revisions are append-only; we skip the save when the latest matches.
      existing = OAuth2ProviderConfig.current(SLUG)
      already_correct = bool(
          existing
          and existing.enabled
          and existing.key == CLIENT_ID
          and existing.secret == CLIENT_SECRET
          and existing.site_id == site.id
          and existing.backend_name == BACKEND_NAME
          and (existing.organization_id == (org.id if org else None))
      )

      if already_correct:
          print("MICROSOFT_SSO_RESULT:UNCHANGED pk=" + str(existing.pk))
      else:
          cfg = OAuth2ProviderConfig(
              backend_name=BACKEND_NAME,
              slug=SLUG,
              name="Microsoft",
              enabled=True,
              visible=True,
              site=site,
              organization=org,
              key=CLIENT_ID,
              secret=CLIENT_SECRET,
              icon_class="fa-sign-in",
              secondary=False,
              skip_hinted_login_dialog=True,
              skip_registration_form=True,
              skip_email_verification=True,
              send_welcome_email=False,
              send_to_registration_first=False,
              sync_learner_profile_data=True,
              enable_sso_id_verification=False,
              disable_for_enterprise_sso=False,
              max_session_length=None,
              other_settings=other_settings,
          )
          cfg.save()
          print("MICROSOFT_SSO_RESULT:CREATED pk=" + str(cfg.pk))
      print("MICROSOFT_SSO_DONE")
      PY
    executable: /bin/bash
  register: microsoft_sso_result
  changed_when: "'CREATED' in (microsoft_sso_result.stdout | default(''))"
  no_log: true
  when: microsoft_sso_enabled | default(false) | bool

- name: Confirm Microsoft SSO configuration applied
  ansible.builtin.debug:
    msg:
      - "Microsoft SSO configured for learn.{{ base_domain }} (platform={{ platform_name | default('main') }}, organization={{ microsoft_sso_organization or '(none)' }})"
      - "ACTION REQUIRED (client): register this redirect URI in the Azure AD app registration ->"
      - "  https://learn.{{ base_domain }}/auth/complete/azuread-oauth2/"
  when: microsoft_sso_enabled | default(false) | bool

# ---------------------------------------------------------------------------
# IBL_SPA.AUTH patches consumed by the Auth + Mentor SPAs at boot.
#
#   - EXTERNAL_IDP_LOGOUT_URL  — hit by the Auth SPA on sign-out to redirect
#     the user through Microsoft's logout endpoint, then back to our own
#     auth host (so the Azure session is killed alongside ours).
#   - IBL_DIRECT_SSO_URL       — the "Sign in with Microsoft" deep link the
#     SPA renders. Points at the LMS python-social-auth login endpoint for
#     the `azuread-oauth2` backend, with an inner
#     `?next=...` that completes the OAuth dance back into the SPA's
#     /login/complete callback. The inner client_id MUST be the same
#     EDX_SSO_CLIENT_ID the ibl_spa role minted for the `spa-sso`
#     Application — we read it from config.yml rather than re-deriving it.
#
# Tenant ID: uses `microsoft_sso_tenant_id` when set; falls back to "common"
# (multi-tenant) when blank. Same pattern as the existing logout_url in the
# OAuth2ProviderConfig.other_settings JSON above.
#
# Idempotent: only marks `changed` (and triggers the downstream
# `ibl config save` + SPA restart) when the resolved values differ from
# what's already in config.yml.
# ---------------------------------------------------------------------------

- name: Patch IBL_SPA.AUTH with Microsoft SSO logout + direct-SSO URLs
  become: false
  ansible.builtin.shell:
    cmd: |
      python3 <<'PY'
      import sys
      import yaml
      from urllib.parse import quote

      PATH = "{{ ibl_root }}/config.yml"
      BASE_DOMAIN = "{{ base_domain }}"
      PLATFORM_NAME = "{{ platform_name | default('main') }}"
      TENANT_ID = "{{ microsoft_sso_tenant_id }}".strip() or "common"
      # Azure AD requires the standard `azuread-oauth2` social-auth backend.
      # It must equal the OAuth2ProviderConfig slug AND the registered redirect
      # URI (/auth/complete/azuread-oauth2/). The old `<platform>-oauth2` value
      # was not a real Azure backend, so SSO never completed.
      BACKEND_NAME = "azuread-oauth2"

      with open(PATH) as f:
          cfg = yaml.safe_load(f) or {}

      spa = cfg.setdefault("IBL_SPA", {})
      auth = spa.setdefault("AUTH", {})

      spa_sso_client_id = (spa.get("EDX_SSO_CLIENT_ID") or "").strip()
      if not spa_sso_client_id:
          print("ERROR: IBL_SPA.EDX_SSO_CLIENT_ID is empty — ibl_spa role must run first")
          sys.exit(1)

      external_logout = (
          "https://login.microsoftonline.com/" + TENANT_ID +
          "/oauth2/v2.0/logout?post_logout_redirect_uri=" +
          "https://auth." + BASE_DOMAIN
      )

      # Inner /oauth2/authorize URL the LMS completes into after Microsoft
      # auth. URL-encoded verbatim into the outer `next=` query param so
      # python-social-auth treats the whole thing as one opaque target.
      inner_next = (
          "/oauth2/authorize?response_type=code"
          "&client_id=" + spa_sso_client_id +
          "&scope=profile email"
          "&redirect_uri=https://auth." + BASE_DOMAIN + "/login/complete"
      )
      direct_sso = (
          "https://learn." + BASE_DOMAIN + "/auth/login/" + BACKEND_NAME +
          "/?auth_entry=login&next=" + quote(inner_next, safe="")
      )

      desired = {
          "EXTERNAL_IDP_LOGOUT_URL": external_logout,
          "IBL_DIRECT_SSO_URL": direct_sso,
      }
      current = {k: auth.get(k) for k in desired}
      if current == desired:
          print("SPA_AUTH_UNCHANGED")
      else:
          auth.update(desired)
          with open(PATH, "w") as f:
              yaml.safe_dump(cfg, f, default_flow_style=False, sort_keys=False)
          print("SPA_AUTH_PATCHED")
      PY
    executable: /bin/bash
  register: spa_auth_patch
  changed_when: "'SPA_AUTH_PATCHED' in (spa_auth_patch.stdout | default(''))"
  when: microsoft_sso_enabled | default(false) | bool

- name: Save platform config (regenerate SPA env files)
  become: false
  ansible.builtin.shell:
    cmd: |
      export PYENV_ROOT="{{ pyenv_root }}"
      export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
      pyenv activate "{{ venv_name }}"
      ibl config save
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  when:
    - microsoft_sso_enabled | default(false) | bool
    - spa_auth_patch.changed | default(false)

# `docker compose down && up -d` (not `restart`) because compose only
# re-reads the env file at container creation time. The Auth SPA owns the
# IBL_DIRECT_SSO_URL / EXTERNAL_IDP_LOGOUT_URL renders directly; the Mentor
# SPA reuses the same AUTH block for its login deep link.
- name: Restart Auth + Mentor SPAs to pick up new IBL_SPA.AUTH values
  become: false
  ansible.builtin.shell:
    cmd: |
      set -e
      cd {{ ibl_root }}/app/ibl-spa/auth/ && docker compose down && docker compose up -d
      cd {{ ibl_root }}/app/ibl-spa/mentor/ && docker compose down && docker compose up -d
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"
  when:
    - microsoft_sso_enabled | default(false) | bool
    - spa_auth_patch.changed | default(false)

- name: Confirm IBL_SPA.AUTH patched for Microsoft SSO
  ansible.builtin.debug:
    msg: >-
      IBL_SPA.AUTH updated: EXTERNAL_IDP_LOGOUT_URL → login.microsoftonline.com/{{ microsoft_sso_tenant_id | default('common', true) }}/...,
      IBL_DIRECT_SSO_URL → learn.{{ base_domain }}/auth/login/azuread-oauth2/...
  when:
    - microsoft_sso_enabled | default(false) | bool
    - spa_auth_patch.changed | default(false)
