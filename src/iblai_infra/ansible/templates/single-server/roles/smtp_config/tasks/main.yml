---
# Optional SMTP configuration. Runs only when `smtp_enabled` is true (CLI
# prompt during `iblai infra setup`, or `--smtp-host` / `SMTP_HOST` for
# `iblai infra launch`).
#
# Writes the canonical IBL_SMTP_* + IBL_SMTP_SYSTEM_* keys at the root of
# config.yml — both groups share the same values, mirroring the stg1
# layout. Updates BOTH the staging copy (~/.local/share/ibl/config.yml)
# and the runtime copy (/ibl/config.yml) so a subsequent `ibl config save`
# doesn't reset the runtime values from a stale staging file (skill §7.5).
#
# Runs BEFORE service-start roles in both setup and launch playbooks, so
# the rendered Compose templates pick up SMTP_HOST/USER/PASSWORD env vars
# on first boot — no service restart required.
#
# Password is passed in via extra_vars and never written to disk by the
# runner. The whole task carries `no_log: true` so the rendered shell
# body (which contains the password as a Jinja-substituted string) stays
# out of -vvv ansible logs.

- name: Write SMTP config to staging + runtime config.yml
  become: false
  ansible.builtin.shell:
    cmd: |
      python3 - <<'PY'
      import yaml, os
      SMTP_KEYS = {
          "IBL_SMTP_HOST":               "{{ smtp_host }}",
          "IBL_SMTP_USER":               "{{ smtp_username }}",
          "IBL_SMTP_PASSWORD":           "{{ smtp_password }}",
          "IBL_SMTP_SENDER_MAIL":        "{{ smtp_sender_email }}",
          "IBL_SMTP_SYSTEM_HOST":        "{{ smtp_host }}",
          "IBL_SMTP_SYSTEM_USER":        "{{ smtp_username }}",
          "IBL_SMTP_SYSTEM_PASSWORD":    "{{ smtp_password }}",
          "IBL_SMTP_SYSTEM_SENDER_MAIL": "{{ smtp_sender_email }}",
          "IBL_SMTP_SYSTEM_PORT":        "{{ smtp_port }}",  # canonical stg1 form: quoted string
          "IBL_SMTP_SYSTEM_TLS":         {{ smtp_use_tls | bool }},
          "IBL_SMTP_SYSTEM_EMAIL_USE_SSL": {{ smtp_use_ssl | bool }},
      }
      paths = [
          "/home/{{ ansible_user }}/.local/share/ibl/config.yml",
          "{{ ibl_root }}/config.yml",
      ]
      written = []
      for path in paths:
          if not os.path.exists(path):
              continue
          with open(path) as f:
              cfg = yaml.safe_load(f) or {}
          for key, value in SMTP_KEYS.items():
              cfg[key] = value
          with open(path, "w") as f:
              yaml.safe_dump(cfg, f, default_flow_style=False, sort_keys=False)
          written.append(path)
      print("SMTP_CONFIG_WRITTEN:", ",".join(written) if written else "no config.yml found")
      PY
    executable: /bin/bash
  when: smtp_enabled | default(false) | bool
  no_log: true  # rendered shell body contains the SMTP password

- name: Re-render templates so SMTP_* env vars land in compose files
  become: false
  ansible.builtin.shell:
    cmd: |
      export PYENV_ROOT="{{ pyenv_root }}"
      export PATH="$PYENV_ROOT/bin:$PATH"
      eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
      pyenv activate "{{ venv_name }}"
      ibl config save
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  when: smtp_enabled | default(false) | bool

- name: Confirm SMTP configuration applied
  ansible.builtin.debug:
    msg: "SMTP configured: {{ smtp_username }}@{{ smtp_host }}:{{ smtp_port }} (tls={{ smtp_use_tls }}, ssl={{ smtp_use_ssl }})"
  when: smtp_enabled | default(false) | bool
